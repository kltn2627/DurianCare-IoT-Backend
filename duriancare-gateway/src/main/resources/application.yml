server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: duriancare-gateway
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URL:lb://duriancare-auth-service}
              predicates:
                - Path=/api/auth/**
            - id: farm-service
              uri: ${FARM_SERVICE_URL:lb://duriancare-farm-service}
              predicates:
                - Path=/api/farms/**,/api/zones/**,/api/trees/**,/api/regimens/**
            - id: cultivation-service
              uri: ${CULTIVATION_SERVICE_URL:lb://duriancare-cultivation-service}
              predicates:
                - Path=/api/cultivation-schedules/**
            - id: iot-service
              uri: ${IOT_SERVICE_URL:http://localhost:3001}
              predicates:
                - Path=/api/iot/**
            - id: ai-service
              uri: ${AI_SERVICE_URL:http://localhost:8000}
              predicates:
                - Path=/api/v1/predict,/api/v1/chat/**,/api/ai/**
            - id: chat-service
              uri: ${CHAT_SERVICE_URL:http://localhost:3002}
              predicates:
                - Path=/api/chat/**,/socket.io/**
            - id: traceability-service
              uri: ${TRACEABILITY_SERVICE_URL:lb://duriancare-traceability-service}
              predicates:
                - Path=/api/traceability/**
            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:lb://duriancare-notification-service}
              predicates:
                - Path=/api/v1/notification/**
            - id: search-service
              uri: ${SEARCH_SERVICE_URL:lb://duriancare-search-service}
              predicates:
                - Path=/api/search/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

duriancare:
  security:
    jwt:
      secret: ${JWT_SECRET:replace-with-at-least-32-characters}
      issuer: ${JWT_ISSUER:duriancare-auth-service}

management:
  endpoints:
    web:
      exposure:
        include: health,info
