server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: duriancare-auth-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/duriancare}
    username: ${SPRING_DATASOURCE_USERNAME:duriancare}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      schema: ${AUTH_DB_SCHEMA:duriancare_auth}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${AUTH_DB_SCHEMA:duriancare_auth}
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    create-schemas: true
    schemas: ${AUTH_DB_SCHEMA:duriancare_auth}
    default-schema: ${AUTH_DB_SCHEMA:duriancare_auth}
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info

duriancare:
  auth:
    otp-ttl: ${AUTH_OTP_TTL:5m}
    events-topic: ${AUTH_EVENTS_TOPIC:duriancare.auth.events}
  security:
    jwt:
      secret: ${JWT_SECRET:replace-with-at-least-32-characters}
      issuer: ${JWT_ISSUER:duriancare-auth-service}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:1h}
      refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:7d}
