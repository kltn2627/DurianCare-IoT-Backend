server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: duriancare-notification-service
  data:
    redis:
      host: ${SPRING_REDIS_HOST}
      port: ${SPRING_REDIS_PORT}
      password: ${SPRING_REDIS_PASSWORD}
      timeout: 3s
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

duriancare:
  notification:
    otp:
      ttl: ${OTP_TTL}
      length: ${OTP_LENGTH}
      max-attempts: ${OTP_MAX_ATTEMPTS}
    mail:
      enabled: ${MAIL_ENABLED}
      from-address: ${MAIL_FROM_ADDRESS}
      from-name: ${MAIL_FROM_NAME}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false
