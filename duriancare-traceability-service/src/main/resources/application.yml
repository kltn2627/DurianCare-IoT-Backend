server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: duriancare-traceability-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/duriancare}
    username: ${DATABASE_USERNAME:duriancare}
    password: ${DATABASE_PASSWORD:duriancare_dev}
    hikari:
      schema: traceability
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info
