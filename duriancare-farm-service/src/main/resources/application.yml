server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: duriancare-farm-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/duriancare}
    username: ${DATABASE_USERNAME:duriancare}
    password: ${DATABASE_PASSWORD:}
    hikari:
      schema: farm
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        default_schema: farm
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: farm
    default-schema: farm
    create-schemas: true
    validate-on-migrate: true
    clean-disabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info
