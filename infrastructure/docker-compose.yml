name: duriancare

services:
  postgres:
    image: postgres:16-alpine
    container_name: duriancare-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - duriancare-network

  mongodb:
    image: mongo:7.0
    container_name: duriancare-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - duriancare-network

  redis:
    image: redis:7-alpine
    container_name: duriancare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - sh
      - -c
      - exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - duriancare-network

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: duriancare-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: CONTROLLER://kafka:9093,INTERNAL://kafka:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - duriancare-network

  emqx:
    image: emqx/emqx:5.8.4
    container_name: duriancare-emqx
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8084:8084"
      - "18083:18083"
    environment:
      EMQX_NAME: duriancare-emqx
      EMQX_HOST: 127.0.0.1
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USERNAME}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD}
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx_ctl", "status"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - duriancare-network

  duriancare-auth-service:
    build:
      context: .
      dockerfile: duriancare-auth-service/Dockerfile
    image: duriancare/auth-service:local
    container_name: duriancare-auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - duriancare-network

  duriancare-farm-service:
    build:
      context: .
      dockerfile: duriancare-farm-service/Dockerfile
    image: duriancare/farm-service:local
    container_name: duriancare-farm-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - duriancare-network

  duriancare-cultivation-service:
    build:
      context: .
      dockerfile: duriancare-cultivation-service/Dockerfile
    image: duriancare/cultivation-service:local
    container_name: duriancare-cultivation-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: 8084
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - duriancare-network

  duriancare-iot-service:
    build:
      context: ./duriancare-iot-service
      dockerfile: Dockerfile
    image: duriancare/iot-service:local
    container_name: duriancare-iot-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MQTT_URL: mqtt://emqx:1883
      MQTT_TOPIC: duriancare/devices/+/telemetry
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/?authSource=admin
      MONGO_DATABASE: duriancare_iot
      KAFKA_BROKERS: kafka:29092
      KAFKA_TELEMETRY_TOPIC: iot.telemetry.received
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      emqx:
        condition: service_healthy
    networks:
      - duriancare-network

  duriancare-ai-service:
    build:
      context: ./duriancare-ai-service
      dockerfile: Dockerfile
    image: duriancare/ai-service:local
    container_name: duriancare-ai-service
    restart: unless-stopped
    environment:
      YOLO_MODEL_PATH: yolov8m.pt
      MOBILENET_WEIGHTS_PATH: models/mobilenetv2_classifier_high_acc.pth
      YOLO_CONFIDENCE: 0.25
      ENABLE_YOLO_CROP: ${ENABLE_YOLO_CROP:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL}
      POSTGRES_URL: jdbc:postgresql://duriancare-postgres:5432/${POSTGRES_DB}
      KNOWLEDGE_BASE_PATH: /app/knowledge_base
      CHROMA_PERSIST_PATH: /app/vector_store
      RAG_COLLECTION_NAME: duriancare_knowledge
    volumes:
      - ai_vector_store:/app/vector_store
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - duriancare-network

  duriancare-chat-service:
    build:
      context: ./duriancare-chat-service
      dockerfile: Dockerfile
    image: duriancare/chat-service:local
    container_name: duriancare-chat-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BROKERS: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - duriancare-network

  duriancare-traceability-service:
    build:
      context: .
      dockerfile: duriancare-traceability-service/Dockerfile
    image: duriancare/traceability-service:local
    container_name: duriancare-traceability-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - duriancare-network

  duriancare-notification-service:
    build:
      context: .
      dockerfile: duriancare-notification-service/Dockerfile
    image: duriancare/notification-service:local
    container_name: duriancare-notification-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      MAIL_ENABLED: ${MAIL_ENABLED}
      OTP_TTL: ${OTP_TTL}
      OTP_LENGTH: ${OTP_LENGTH}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS}
      KAFKA_ALERT_TOPIC: ${KAFKA_ALERT_TOPIC}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - duriancare-network

  duriancare-gateway:
    build:
      context: .
      dockerfile: duriancare-gateway/Dockerfile
    image: duriancare/gateway:local
    container_name: duriancare-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://duriancare-auth-service:8081
      FARM_SERVICE_URL: http://duriancare-farm-service:8082
      CULTIVATION_SERVICE_URL: http://duriancare-cultivation-service:8084
      IOT_SERVICE_URL: http://duriancare-iot-service:3001
      AI_SERVICE_URL: http://duriancare-ai-service:8000
      CHAT_SERVICE_URL: http://duriancare-chat-service:3002
      TRACEABILITY_SERVICE_URL: http://duriancare-traceability-service:8083
      NOTIFICATION_SERVICE_URL: http://duriancare-notification-service:8085
    depends_on:
      redis:
        condition: service_healthy
      duriancare-auth-service:
        condition: service_started
      duriancare-farm-service:
        condition: service_started
      duriancare-cultivation-service:
        condition: service_started
      duriancare-iot-service:
        condition: service_started
      duriancare-ai-service:
        condition: service_started
      duriancare-chat-service:
        condition: service_started
      duriancare-traceability-service:
        condition: service_started
      duriancare-notification-service:
        condition: service_started
    networks:
      - duriancare-network

networks:
  duriancare-network:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  kafka_data:
  emqx_data:
  emqx_log:
  ai_vector_store:
